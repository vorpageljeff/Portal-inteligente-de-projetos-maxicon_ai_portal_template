services:
  - type: web
    name: maxicon-ai-portal-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    healthCheckPath: /health
    startCommand: python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: maxicon-ai-portal-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://maxicon-ai-portal-web.vercel.app
      - key: AI_PROVIDER
        value: mock
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
databases:
  - name: maxicon-ai-portal-db
    plan: basic-256mb
    databaseName: project_portal
    user: project_portal
